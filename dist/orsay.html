<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e63946" />
  <title>Orsay, Can You See?</title>
  <style>
/* "Can You See?" — kid-friendly scavenger-hunt styling.
   Mobile-first: big tap targets, bright colours, readable for a grown-up
   reading aloud to a 4-year-old. */

:root {
  --bg: #fff8f0;
  --ink: #2b2118;
  --accent: #e63946;
  --accent-2: #457b9d;
  --gold: #c9a227;
  --card-radius: 18px;
  --shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Trebuchet MS", "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
  -webkit-text-size-adjust: 100%;
}

header.hunt-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  color: #fff;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  text-align: center;
}

header.hunt-header h1 {
  margin: 0;
  font-size: 1.5rem;
  letter-spacing: 0.5px;
}
header.hunt-header p { margin: 4px 0 0; font-size: 0.95rem; opacity: 0.95; }

/* Progress bar of stars */
.progress {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  justify-content: center;
}
.progress .bar {
  flex: 1;
  max-width: 240px;
  height: 14px;
  background: rgba(255, 255, 255, 0.35);
  border-radius: 99px;
  overflow: hidden;
}
.progress .bar > span {
  display: block;
  height: 100%;
  width: 0%;
  background: #fff;
  border-radius: 99px;
  transition: width 0.4s ease;
}
.progress .count { font-weight: bold; white-space: nowrap; font-size: 0.95rem; }

/* Card grid */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 12px 90px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (max-width: 380px) {
  main { grid-template-columns: 1fr; }
}

.card {
  background: #fff;
  border-radius: var(--card-radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  border: 4px solid transparent;
  transition: transform 0.12s ease, border-color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  flex-direction: column;
}
.card:active { transform: scale(0.97); }
.card.found { border-color: #2a9d8f; }

.card .art {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card .art img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.card .placeholder-icon { font-size: 3.2rem; }

/* The green check + star that appears when found */
.card .stamp {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  background: rgba(42, 157, 143, 0.45);
  opacity: 0;
  transform: scale(0.4) rotate(-20deg);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.card.found .stamp { opacity: 1; transform: scale(1) rotate(-8deg); }

.card .body { padding: 10px 12px 14px; }
.card .body h2 { margin: 0 0 4px; font-size: 1.1rem; }
.card .body .find { margin: 0 0 8px; font-size: 0.95rem; }
.card .body .where { margin: 0; font-size: 0.82rem; color: #6d6875; font-style: italic; }

/* Fun fact toggle */
.card .fact {
  margin: 8px 0 0;
  font-size: 0.85rem;
  background: #fff8f0;
  border-radius: 10px;
  padding: 8px 10px;
  display: none;
}
.card.show-fact .fact { display: block; }
.card .fact-btn {
  margin-top: 8px;
  background: var(--accent-2);
  color: #fff;
  border: none;
  border-radius: 99px;
  padding: 6px 12px;
  font-size: 0.82rem;
  cursor: pointer;
  font-family: inherit;
}

/* Narration button — hidden until enabled later (Web Speech API seam) */
.card .speak-btn {
  display: none; /* flip via HUNT_CONFIG.narration */
  margin-top: 8px;
  margin-left: 6px;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 99px;
  padding: 6px 12px;
  font-size: 0.82rem;
  cursor: pointer;
  font-family: inherit;
}
body.narration .card .speak-btn { display: inline-block; }

/* Footer with reset + win message */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  box-shadow: 0 -4px 14px rgba(0,0,0,0.1);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.footer-bar .win { font-weight: bold; color: var(--accent); }
.reset-btn {
  background: #eee;
  border: none;
  border-radius: 99px;
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
}

/* Confetti */
.confetti {
  position: fixed;
  top: -10px;
  width: 10px; height: 14px;
  z-index: 100;
  pointer-events: none;
  animation: fall 1.6s linear forwards;
}
@keyframes fall {
  to { transform: translateY(105vh) rotate(540deg); opacity: 0; }
}

</style>
</head>

  <script>
/*
 * Orsay scavenger-hunt content.
 *
 * This is the ONLY file you need to edit to change the hunt. Each item:
 *   id     – stable short id (used for the image filename and saved progress)
 *   title  – kid-friendly name, read aloud by a grown-up
 *   find   – the "can you see…?" spotting challenge
 *   where  – a gentle location hint (rooms get rehung, so keep it loose)
 *   fact   – one short, delightful fact about the artist/painting
 *   color  – background colour for the placeholder until a real photo is added
 *   icon   – emoji shown on the placeholder
 *
 * Real photos go in images/<id>.jpg (see images/SOURCES.md + fetch-images.sh).
 * If a photo is missing, the app shows a nice coloured placeholder instead.
 */
window.HUNT = {
  title: "Orsay, Can You See?",
  subtitle: "A treasure hunt for art detectives 🔎",
  items: [

      color: "#c9a227",

    },

  <script>
/*
 * Generic scavenger-hunt engine — museum-agnostic.
 *
 * Give it a `window.HUNT` object (see museums/orsay/data.js) and it renders a
 * grid of big tappable cards, tracks "found" items in localStorage, celebrates
 * with confetti, and shows a progress bar.
 *
 * Reused across museums: a future museums/louvre/ page just loads this file
 * with its own data.js.
 */
(function () {
  "use strict";

  // --- Config (one place to flip future features) -------------------------
  var HUNT_CONFIG = {
    narration: false, // set true later to enable tap-to-hear (Web Speech API)
  };

  var data = window.HUNT;
  if (!data) {
    document.body.innerHTML = "<p style='padding:20px'>No hunt data found.</p>";
    return;
  }

  var STORAGE_KEY = "hunt:" + (data.id || data.title || "default");

  // --- Saved progress ------------------------------------------------------
  function loadFound() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch (e) {
      return {};
    }
  }
  function saveFound(found) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(found));
    } catch (e) {
      /* private mode / storage full — game still works for the session */
    }
  }
  var found = loadFound();

  // --- Narration seam (no-op until enabled) --------------------------------
  function speak(text) {
    if (!HUNT_CONFIG.narration) return;
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
  }

  // --- Build the DOM -------------------------------------------------------
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (k) {
      if (k === "class") node.className = attrs[k];
      else if (k === "html") node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) {
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  document.title = data.title;

  var header = el("header", { class: "hunt-header" }, [
    el("h1", {}, [data.title]),
    el("p", {}, [data.subtitle || ""]),
  ]);
  var progressBar = el("span");
  var countLabel = el("span", { class: "count" });
  header.appendChild(
    el("div", { class: "progress" }, [
      el("span", { class: "bar" }, [progressBar]),
      countLabel,
    ])
  );

  var grid = el("main", { class: "hunt-grid" });

  data.items.forEach(function (item) {
    var card = el("div", { class: "card", "data-id": item.id });

    // Art (real image if present, else coloured placeholder)
    var art = el("div", { class: "art" });
    art.style.background = item.color || "#ccc";
    // Single-file builds inject base64 data URIs into window.HUNT_IMAGES;
    // otherwise we load the photo from the images/ folder.
    var inlined = window.HUNT_IMAGES && window.HUNT_IMAGES[item.id];
    var img = el("img", {
      alt: item.title,
      src: inlined || "images/" + item.id + ".jpg",
      loading: "lazy",
    });
    // If the real photo is missing, fall back to the emoji placeholder.
    img.addEventListener("error", function () {
      img.remove();
      art.appendChild(el("div", { class: "placeholder-icon" }, [item.icon || "🖼️"]));
    });
    art.appendChild(img);
    art.appendChild(el("div", { class: "stamp" }, ["✅"]));
    card.appendChild(art);

    // Body
    var body = el("div", { class: "body" });
    body.appendChild(el("h2", {}, [item.title]));
    body.appendChild(el("p", { class: "find" }, [item.find]));
    if (item.where) body.appendChild(el("p", { class: "where" }, [item.where]));

    var fact = el("p", { class: "fact" }, [item.fact || ""]);
    body.appendChild(fact);

    var factBtn = el("button", { class: "fact-btn", type: "button" }, ["💡 Fun fact"]);
    factBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      card.classList.toggle("show-fact");
    });
    body.appendChild(factBtn);

    var speakBtn = el("button", { class: "speak-btn", type: "button" }, ["🔊 Hear it"]);
    speakBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      speak(item.title + ". " + item.find + " " + (item.fact || ""));
    });
    body.appendChild(speakBtn);

    card.appendChild(body);

    if (found[item.id]) card.classList.add("found");

    // Tap the card (anywhere except the buttons) to mark found / unfound.
    card.addEventListener("click", function () {
      var nowFound = !card.classList.contains("found");
      card.classList.toggle("found", nowFound);
      if (nowFound) {
        found[item.id] = true;
        celebrate(card);
      } else {
        delete found[item.id];
      }
      saveFound(found);
      updateProgress();
    });

    grid.appendChild(card);
  });

  // --- Footer (win message + reset) ---------------------------------------
  var winLabel = el("span", { class: "win" });
  var resetBtn = el("button", { class: "reset-btn", type: "button" }, ["🔄 Start over"]);
  resetBtn.addEventListener("click", function () {
    found = {};
    saveFound(found);
    document.querySelectorAll(".card.found").forEach(function (c) {
      c.classList.remove("found");
    });
    updateProgress();
  });
  var footer = el("div", { class: "footer-bar" }, [winLabel, resetBtn]);

  // --- Mount ---------------------------------------------------------------
  document.body.appendChild(header);
  document.body.appendChild(grid);
  document.body.appendChild(footer);
  if (HUNT_CONFIG.narration) document.body.classList.add("narration");

  // --- Progress + celebration ---------------------------------------------
  function updateProgress() {
    var total = data.items.length;
    var n = data.items.filter(function (i) { return found[i.id]; }).length;
    progressBar.style.width = Math.round((n / total) * 100) + "%";
    countLabel.textContent = "⭐ " + n + " / " + total;
    winLabel.textContent =
      n === total ? "🎉 You found them all! Great job, art detective!" : "";
    if (n === total && total > 0) burstConfetti(40);
  }

  function celebrate(card) {
    var rect = card.getBoundingClientRect();
    burstConfetti(16, rect.left + rect.width / 2, rect.top + rect.height / 2);
  }

  var COLORS = ["#e63946", "#457b9d", "#c9a227", "#2a9d8f", "#e76f51", "#f4a261"];
  function burstConfetti(count, x, y) {
    for (var i = 0; i < count; i++) {
      var c = document.createElement("div");
      c.className = "confetti";
      c.style.background = COLORS[i % COLORS.length];
      c.style.left = (x != null ? x : Math.random() * window.innerWidth) + "px";
      if (y != null) c.style.top = y + "px";
      c.style.animationDelay = (Math.random() * 0.3) + "s";
      document.body.appendChild(c);
      (function (node) {
        setTimeout(function () { node.remove(); }, 2000);
      })(c);
    }
  }

  updateProgress();
})();

</script>
